# ============================================================
# TinyTapeout Project Info (CI FIXED VERSION)
# ============================================================
yaml_version: 6
project:
title: "Binary Neural Network Inference Engine"
author: "HIMANSHU PAL"

description: "A fully combinational Binary Neural Network (BNN) inference engine. This design replaces multiplication with XNOR logic and accumulation with popcount, enabling efficient neural network computation in hardware. It classifies a 6-bit input into two output classes using a 2-layer architecture."

language: "Verilog"
clock_hz: 0

tiles: "1x1" 
top_module: "bnn_top"

source_files:
  - "bnn_top.v"
  - "bnn_neuron6.v"
  - "bnn_neuron4.v"
  - "popcount4.v"



# ============================================================
# Pinout (REQUIRED)
# ============================================================

pinout:
  ui[0]: "Input feature bit 0"
  ui[1]: "Input feature bit 1"
  ui[2]: "Input feature bit 2"
  ui[3]: "Input feature bit 3"
  ui[4]: "Input feature bit 4"
  ui[5]: "Input feature bit 5"
  ui[6]: "Unused"
  ui[7]: "Unused"

  uo[0]: "Class 0 output"
  uo[1]: "Class 1 output"
  uo[2]: "Confidence bit (class 0)"
  uo[3]: "Confidence bit (class 1)"
  uo[4]: "Hidden neuron 0"
  uo[5]: "Hidden neuron 1"
  uo[6]: "Hidden neuron 2"
  uo[7]: "Hidden neuron 3"

